<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Password</title>

<style>

body{
font-family:'Segoe UI',sans-serif;
background:#f1f5f9;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.card{
background:white;
padding:40px;
width:360px;
border-radius:12px;
box-shadow:0 15px 35px rgba(0,0,0,0.1);
text-align:center;
}

h2{
margin-bottom:10px;
}

.desc{
font-size:14px;
color:#555;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
border:1px solid #ddd;
border-radius:6px;
margin-bottom:15px;
font-size:14px;
outline:none;
transition:0.2s;
}

input:focus{
border-color:#2563eb;
box-shadow:0 0 0 2px rgba(37,99,235,0.15);
}

button{
width:100%;
padding:12px;
border:none;
background:#2563eb;
color:white;
border-radius:6px;
cursor:pointer;
font-size:15px;
transition:0.2s;
}

button:hover{
background:#1e40af;
}

p{
margin-top:15px;
font-size:14px;
}

a{
color:#2563eb;
text-decoration:none;
}

a:hover{
text-decoration:underline;
}

.success{
margin-top:10px;
font-size:14px;
color:green;
display:none;
}

</style>
</head>

<body>

<div class="card">

<h2>Forgot Password</h2>

<p class="desc">Enter your email and we'll send a password reset link.</p>

<form id="resetForm">

<input type="email" id="email" placeholder="Email Address" required>

<button type="submit">Send Reset Link</button>

<p class="success" id="successMsg">
✔ Reset link sent! Check your email.
</p>

<p>
<a href="login.html">Back to Login</a>
</p>

</form>

</div>

<script>

document.getElementById("resetForm").addEventListener("submit",function(e){

e.preventDefault()

const email = document.getElementById("email").value

if(!email){
alert("Please enter your email")
return
}

document.getElementById("successMsg").style.display="block"

setTimeout(()=>{
window.location.href="login.html"
},2000)

})

</script>

</body>
</html>
