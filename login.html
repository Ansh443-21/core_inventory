<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CoreInventory Login</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
min-height:100vh;
display:flex;
background:#f1f5f9;
}

/* LEFT SIDE */
  
.left{
flex:1;
background:#111827;
color:white;
display:flex;
flex-direction:column;
justify-content:center;
padding:80px;
position:relative;
}

.left::before{
content:"";
position:absolute;
left:0;
top:0;
width:8px;
height:100%;
background:#2563eb;
}

.logo{
font-size:36px;
font-weight:700;
margin-bottom:15px;
display:flex;
align-items:center;
gap:12px;
}

.logo i{
color:#3b82f6;
}

.tagline{
font-size:20px;
margin-bottom:40px;
opacity:0.9;
}

/* FEATURES */

.features{
display:flex;
flex-direction:column;
gap:20px;
}

.feature{
display:flex;
align-items:center;
gap:14px;
font-size:16px;
opacity:0.9;
transition:0.3s;
}

.feature i{
width:36px;
height:36px;
display:flex;
align-items:center;
justify-content:center;
background:#1f2937;
border-radius:8px;
color:#60a5fa;
}

.feature:hover{
transform:translateX(6px);
}

/* RIGHT SIDE */

.right{
flex:1;
display:flex;
justify-content:center;
align-items:center;
background:#f8fafc;
}

/* LOGIN CARD */

.login-card{
width:380px;
background:white;
padding:45px;
border-radius:14px;
box-shadow:0 20px 45px rgba(0,0,0,0.08);
animation:fadeUp 0.7s ease;
}

@keyframes fadeUp{
from{
opacity:0;
transform:translateY(30px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.login-title{
font-size:26px;
font-weight:600;
margin-bottom:6px;
}

.login-sub{
font-size:14px;
color:#666;
margin-bottom:30px;
}

/* INPUT GROUP */

.input-group{
position:relative;
margin-bottom:25px;
}

.input-group i{
position:absolute;
left:12px;
top:50%;
transform:translateY(-50%);
color:#888;
}

.input-group input{
width:100%;
padding:12px 40px 12px 38px;
border:1px solid #ddd;
border-radius:8px;
font-size:14px;
transition:0.25s;
}

.input-group input:focus{
border-color:#2563eb;
box-shadow:0 0 4px rgba(37,99,235,0.3);
outline:none;
}

/* PASSWORD EYE */

.toggle-password{
position:absolute;
right:12px;
top:50%;
transform:translateY(-50%);
cursor:pointer;
color:#777;
}

/* LOGIN BUTTON */

.login-btn{
width:100%;
padding:13px;
border:none;
border-radius:8px;
background:#2563eb;
color:white;
font-size:15px;
cursor:pointer;
display:flex;
align-items:center;
justify-content:center;
gap:8px;
transition:0.25s;
}

.login-btn:hover{
background:#1e40af;
transform:translateY(-2px);
}

/* LINKS */

.extra{
margin-top:18px;
font-size:14px;
display:flex;
justify-content:space-between;
}

.extra a{
text-decoration:none;
color:#2563eb;
}

.extra a:hover{
text-decoration:underline;
}

/* RESPONSIVE */

@media(max-width:900px){

body{
flex-direction:column;
}

.left{
padding:50px;
align-items:center;
text-align:center;
}

.features{
align-items:center;
}

}

</style>
</head>

<body>

<!-- LEFT PANEL -->

<div class="left">

<div class="logo">
<i class="fa-solid fa-boxes-stacked"></i>
CoreInventory
</div>

<div class="tagline">
Inventory Management Made Simple
</div>

<div class="features">

<div class="feature">
<i class="fa-solid fa-chart-line"></i>
Track inventory analytics
</div>

<div class="feature">
<i class="fa-solid fa-warehouse"></i>
Manage multiple warehouses
</div>

<div class="feature">
<i class="fa-solid fa-barcode"></i>
Scan and track products
</div>

<div class="feature">
<i class="fa-solid fa-robot"></i>
Automated stock alerts
</div>

</div>

</div>

<!-- RIGHT PANEL -->

<div class="right">

<div class="login-card">

<div class="login-title">Sign In</div>
<div class="login-sub">Access your inventory dashboard</div>

<form id="loginForm">

<div class="input-group">
<i class="fa fa-envelope"></i>
<input type="email" id="email" placeholder="Email address" required>
</div>

<div class="input-group">
<i class="fa fa-lock"></i>
<input type="password" id="password" placeholder="Password" required>
<i class="fa fa-eye toggle-password" onclick="togglePassword()"></i>
</div>

<button type="submit" class="login-btn">
<i class="fa-solid fa-right-to-bracket"></i>
Login
</button>

<div class="extra">
<a href="forgot.html">Forgot Password?</a>
<a href="signup.html">Create Account</a>
</div>

</form>

</div>

</div>

<script>

function togglePassword(){
const pass=document.getElementById("password");
pass.type = pass.type === "password" ? "text" : "password";
}

document.getElementById("loginForm").addEventListener("submit", async function(e){

e.preventDefault()

const email=document.getElementById("email").value
const password=document.getElementById("password").value

try{

const res=await fetch("http://localhost:3000/login",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({email,password})
})

if(res.status===401){
alert("Invalid email or password")
return
}

const data=await res.json()

localStorage.setItem("user",JSON.stringify(data))

window.location.href="dashboard.html"

}catch(err){

alert("Server connection failed")

}

})

</script>

</body>
</html>
